    <link rel="icon" type="image/svg+xml" href="favicon.svg" />  <!-- removed leading / -->

    <!-- GitHub Pages SPA redirect fix -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('~and~').map(decodeURIComponent);
          window.history.replaceState(null, null,
            decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
